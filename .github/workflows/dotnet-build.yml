name: .NET Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Build Transaction API Docker image
      run: docker build -t transaction-api:test -f TransactionApi/Dockerfile .
    
    - name: Build Processor Service Docker image
      run: docker build -t processor-service:test -f ProcessorService/Dockerfile .
    
    - name: Verify images built successfully
      run: |
        docker images | grep transaction-api
        docker images | grep processor-service
